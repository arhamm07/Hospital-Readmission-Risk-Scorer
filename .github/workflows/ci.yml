name: CI — Test + Lint + Quality Gate

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check src/ --output-format=github

      - name: Black format check
        run: black --check src/

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  quality-gate:
    name: Model Quality Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt dvc

      - name: Pull DVC artefacts
        run: dvc pull --no-run-cache
        continue-on-error: true

      - name: Check metrics file exists
        run: |
          if [ ! -f reports/metrics.json ]; then
            echo "metrics.json not found — skipping gate"
            exit 0
          fi

      - name: Quality gate check
        run: |
          python - <<'EOF'
          import json, sys

          with open("reports/metrics.json") as f:
              m = json.load(f)

          gates = {
              "test_auc_roc":  (m.get("test_auc_roc",  0), 0.70, ">="),
              "test_auc_pr":   (m.get("test_auc_pr",   0), 0.25, ">="),
              "test_ece":      (m.get("test_ece",       1), 0.05, "<="),
          }

          failed = []
          for name, (value, threshold, op) in gates.items():
              ok = (value >= threshold) if op == ">=" else (value <= threshold)
              status = "✅" if ok else "❌"
              print(f"  {status}  {name}: {value:.4f} {op} {threshold}")
              if not ok:
                  failed.append(name)

          if failed:
              print(f"\n❌ Quality gate FAILED: {failed}")
              sys.exit(1)
          else:
              print("\n✅ All quality gates passed!")
          EOF

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t readmission-risk:ci-${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run --rm \
            -v $(pwd)/models:/app/models:ro \
            -v $(pwd)/data/processed:/app/data/processed:ro \
            readmission-risk:ci-${{ github.sha }} \
            python -c "from src.utils.config import load_config; print('Config OK')"