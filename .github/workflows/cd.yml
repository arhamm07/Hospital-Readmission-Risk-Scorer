name: CD — Build + Push + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  IMAGE_NAME: readmission-risk
  REGISTRY:   ghcr.io/${{ github.repository_owner }}

jobs:

  build-and-push:
    name: Build + Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Deploy staging
        run: |
          echo "Deploying ${{ needs.build-and-push.outputs.image_tag }} to staging"
          # Replace with your actual deploy command:
          # docker-compose pull && docker-compose up -d
          # kubectl set image deployment/readmission-api api=<image>
          # ansible-playbook deploy.yml

      - name: Run smoke tests
        run: |
          sleep 15
          curl -f http://staging-host:8000/health || exit 1
          echo "✅ Staging health check passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy production
        run: |
          echo "Deploying ${{ needs['build-and-push'].outputs.image_tag }} to production"
          # Replace with your actual deploy command

      - name: Verify deployment
        run: |
          sleep 20
          curl -f http://prod-host:8000/health     || exit 1
          curl -f http://prod-host:8000/model-info || exit 1
          echo "✅ Production deployment verified"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployed to production successfully"
          # Add Slack / email notification here

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Production deployment FAILED"
          # Add Slack / email notification here